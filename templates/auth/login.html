{% extends "base.html" %}
{% block content %}
<div class="max-w-sm mx-auto mt-12">
    <h1 class="text-2xl font-bold mb-6 text-center">Log in to Giglz</h1>
    <form method="POST" action="{{ url_for('auth.login_submit') }}" class="space-y-4">
        <div>
            <label for="email" class="label">Email</label>
            <input type="email" name="email" id="email" class="input w-full" required autofocus>
        </div>
        <button type="submit" class="btn-primary w-full">Send login link</button>
    </form>
</div>
{% endblock %}
