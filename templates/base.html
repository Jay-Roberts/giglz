<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giglz</title>
</head>
<body>

        <a href="{{ url_for('shows.list_shows') }}">Shows</a>

</html>
