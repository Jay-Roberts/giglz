<!DOCTYPE html>
<html lang="en" data-theme="gray">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giglz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-bg text-text min-h-screen font-body pb-20">
    <nav class="bg-surface border-b border-border px-4 py-3 flex items-center gap-6">
        <a href="{{ url_for('shows.list_shows') }}" class="text-display text-accent text-xl hover:text-secondary transition-colors">Giglz</a>
        <a href="{{ url_for('shows.list_shows') }}" class="text-accent hover:underline">Shows</a>
        <a href="{{ url_for('board.index') }}" class="text-accent hover:underline">Board</a>
        <a href="{{ url_for('playlists.scouting') }}" class="text-accent hover:underline">Scouting</a>
        <span class="ml-auto flex items-center gap-3">
            <select id="theme-picker" onchange="setTheme(this.value)" class="bg-surface border border-border rounded px-2 py-1 text-text">
                <option value="gray">gray</option>
                <option value="miami">miami</option>
                <option value="arcade">arcade</option>
            </select>
            <form method="POST" action="{{ url_for('auth.logout') }}">
                <button type="submit" class="text-text-muted hover:text-text">Logout</button>
            </form>
        </span>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-6">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash bg-surface border border-border px-4 py-2 rounded mb-4 {{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <footer id="player-bar" x-data="player()" x-init="startPolling()" class="fixed bottom-0 left-0 right-0 bg-surface border-t border-border px-4 py-3 flex items-center gap-4">
        <template x-if="!connected">
            <a href="/spotify/connect" class="text-accent hover:underline">Connect Spotify</a>
        </template>
        <template x-if="connected && playing">
            <div class="flex items-center gap-4">
                <img :src="track.album_art" alt="Album art" class="w-10 h-10 rounded">
                <div>
                    <span x-text="track.name"></span> —
                    <span x-text="track.artist" class="text-text-muted"></span>
                </div>
                <button
                    @click="toggleLove()"
                    :class="track?.loved ? 'text-accent' : 'text-text-muted hover:text-accent'"
                    :disabled="!track">
                    ♥
                </button>
                <template x-if="showContext">
                    <button @click="scoutShow(showContext.show_id)" class="text-accent hover:underline">
                        Scout <span x-text="showContext.show_name"></span>
                    </button>
                </template>
            </div>
        </template>
        <template x-if="connected && !playing">
            <span class="text-text-muted">Not playing</span>
        </template>
        <template x-if="connected">
            <form method="POST" action="/spotify/disconnect" class="ml-auto">
                <button type="submit" class="text-text-muted hover:text-text text-sm">Disconnect</button>
            </form>
        </template>
    </footer>

    <script>
    function player() {
        return {
            connected: false,
            playing: false,
            track: null,
            showContext: null,

            startPolling() {
                this.poll();
                setInterval(() => this.poll(), 3000);
            },

            async poll() {
                try {
                    const res = await fetch('/api/now-playing');
                    if (res.status === 401) {
                        this.connected = false;
                        return;
                    }
                    const data = await res.json();

                    if (data.connected === false) {
                        this.connected = false;
                        return;
                    }

                    this.connected = true;
                    this.playing = data.playing;
                    this.track = data.track;
                    this.showContext = data.show_context;
                } catch (e) {
                    console.error('Poll failed', e);
                }
            },

            async toggleLove() {
                if (!this.track) return;

                const res = await fetch('/api/love', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ spotify_track_id: this.track.id })
                });

                if (res.ok) {
                    const data = await res.json();
                    this.track.loved = data.loved;
                }
            },

            async scoutShow(showId) {
                const res = await fetch(`/api/shows/${showId}/scout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (res.ok) {
                    console.log('Scouting started');
                }
            }
        }
    }
    </script>
    <script>
    function setTheme(t) {
        document.documentElement.dataset.theme = t;
        localStorage.setItem('theme', t);
    }
    (function() {
        const saved = localStorage.getItem('theme') || 'gray';
        document.documentElement.dataset.theme = saved;
        const picker = document.getElementById('theme-picker');
        if (picker) picker.value = saved;
    })();
    </script>
</body>
</html>
