{% extends "base.html" %}
{% block content %}
<div class="max-w-lg">
    <h1 class="text-2xl font-bold mb-6">Add Show</h1>
    <form method="POST" action="{{ url_for('shows.add_submit') }}" class="space-y-4">
        <div>
            <label for="artists" class="label">Artists (comma-separated)</label>
            <input type="text" name="artists" id="artists" class="input w-full"
                   placeholder="Artist 1, Artist 2" required>
        </div>
        <div>
            <label for="date" class="label">Date</label>
            <input type="date" name="date" id="date" class="input w-full" required>
        </div>
        <div>
            <label for="venue" class="label">Venue</label>
            <input type="text" name="venue" id="venue" class="input w-full"
                   placeholder="The Earl" required>
        </div>
        <div>
            <label for="city" class="label">City</label>
            <input type="text" name="city" id="city" class="input w-full"
                   placeholder="Atlanta" required>
        </div>
        <div>
            <label for="ticket_url" class="label">Ticket URL (optional)</label>
            <input type="url" name="ticket_url" id="ticket_url" class="input w-full"
                   placeholder="https://...">
        </div>
        <div class="flex items-center gap-4 pt-2">
            <button type="submit" class="btn-primary">Add Show</button>
            <a href="{{ url_for('shows.list_shows') }}" class="text-accent hover:underline">Back to shows</a>
        </div>
    </form>
</div>
{% endblock %}
