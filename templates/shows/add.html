{% extends "base.html" %}
{% block content %}
<div class="add-show">
    <h1>Add Show</h1>
    <form method="POST" action="{{ url_for('shows.add_submit') }}">
        <div>
            <label for="artists">Artists (comma-separated)</label>
            <input type="text" name="artists" id="artists"
                   placeholder="Artist 1, Artist 2" required>
        </div>
        <div>
            <label for="date">Date</label>
            <input type="date" name="date" id="date" required>
        </div>
        <div>
            <label for="venue">Venue</label>
            <input type="text" name="venue" id="venue"
                   placeholder="The Earl" required>
        </div>
        <div>
            <label for="city">City</label>
            <input type="text" name="city" id="city"
                   placeholder="Atlanta" required>
        </div>
        <div>
            <label for="ticket_url">Ticket URL (optional)</label>
            <input type="url" name="ticket_url" id="ticket_url"
                   placeholder="https://...">
        </div>
        <button type="submit">Add Show</button>
    </form>
    <p><a href="{{ url_for('shows.list_shows') }}">Back to shows</a></p>
</div>
{% endblock %}
