site_name: giglz
site_description: API reference for giglz

theme:
  name: material
  palette:
    scheme: slate
    primary: green
    accent: light green

nav:
  - Home: index.md
  - API Reference: api/

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            members_order: source
